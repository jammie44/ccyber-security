services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: cyberplatform-api
    runtime: python
    region: oregon
    plan: standard
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 4
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DATABASE_URL
        fromDatabase:
          name: cyberplatform-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cyberplatform-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: "https://cyberplatform-web.onrender.com"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELASTICSEARCH_URL
        sync: false
      - key: KAFKA_BOOTSTRAP_SERVERS
        sync: false
    autoDeploy: true

  # ── Celery Worker ────────────────────────────────────────────────────────────
  - type: worker
    name: cyberplatform-worker
    runtime: python
    region: oregon
    plan: standard
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 -Q default,scoring,monitoring,discovery
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cyberplatform-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cyberplatform-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          name: cyberplatform-api
          type: web
          envVarKey: SECRET_KEY
      - key: ENVIRONMENT
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELASTICSEARCH_URL
        sync: false
      - key: KAFKA_BOOTSTRAP_SERVERS
        sync: false
    autoDeploy: true

  # ── Celery Beat Scheduler ────────────────────────────────────────────────────
  - type: worker
    name: cyberplatform-beat
    runtime: python
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.tasks.celery_app beat --loglevel=info --scheduler celery.schedulers:PersistentScheduler
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cyberplatform-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cyberplatform-redis
          type: redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
    autoDeploy: true

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: cyberplatform-web
    runtime: node
    region: oregon
    plan: starter
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run preview -- --host 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_VERSION
        value: "20.11.0"
      - key: VITE_API_BASE_URL
        value: "https://cyberplatform-api.onrender.com"
      - key: VITE_WS_BASE_URL
        value: "wss://cyberplatform-api.onrender.com"
    autoDeploy: true

  # ── Redis ────────────────────────────────────────────────────────────────────
  - type: redis
    name: cyberplatform-redis
    region: oregon
    plan: starter
    ipAllowList: []

databases:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  - name: cyberplatform-db
    region: oregon
    plan: standard
    databaseName: cyberplatform
    user: cyberplatform
    ipAllowList: []
